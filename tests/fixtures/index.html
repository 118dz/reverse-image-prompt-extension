<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图片反推插件测试页</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101318;
        color: #f4f6f8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(980px, calc(100vw - 48px));
        display: grid;
        grid-template-columns: minmax(280px, 420px) 1fr;
        gap: 32px;
        align-items: center;
      }

      img {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 14px;
        font-size: 28px;
      }

      p {
        margin: 0;
        color: #c6ccd5;
        font-size: 15px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="./sample-card.png" alt="Moon Rally neon poster">
      <section>
        <h1>插件测试图</h1>
        <p>右键左侧图片，选择“反推图片提示词”。这张图用于验证插件能否抓住复刻所需的主体、构图、光影、配色、材质、文字和负面约束。</p>
      </section>
    </main>
  </body>
</html>
